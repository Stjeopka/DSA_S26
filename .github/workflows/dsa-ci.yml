name: DSA Project CI

# ─── Triggers ─────────────────────────────────────────────────────────────────
#
#  • pull_request → main  : compile + test only the changed project(s).
#  • push → main          : (i.e. a PR was merged) compile, test, then run the
#                           submission script and publish the ZIP as a Release.
#
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# ── Permissions ───────────────────────────────────────────────────────────────
# contents:write lets the submit job create GitHub Releases and upload assets.
permissions:
  contents: write

jobs:
  # ── 1. Detect which project(s) actually changed ─────────────────────────────
  #
  #  Runs the helper script .github/scripts/detect-changed-projects.sh which
  #  diffs the two relevant SHAs and returns a JSON array like:
  #    ["Ex00_LastNamesOfMembers_project"]
  #
  #  The result is exposed as a job output so downstream jobs can matrix over it.
  # ─────────────────────────────────────────────────────────────────────────────
  detect-changes:
    name: Detect changed projects
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.detect.outputs.projects }}
      has_changes: ${{ steps.detect.outputs.has_changes }}

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          # Full history is required so the detection script can diff any two SHAs.
          fetch-depth: 0

      - name: Detect changed projects
        id: detect
        run: |
          # Choose the correct base / head pair depending on the event type.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            # push event: github.event.before → github.event.after
            BASE="${{ github.event.before }}"
            HEAD="${{ github.event.after }}"
          fi

          chmod +x .github/scripts/detect-changed-projects.sh
          PROJECTS=$(bash .github/scripts/detect-changed-projects.sh "$BASE" "$HEAD")

          echo "Detected changed projects: $PROJECTS"
          echo "projects=$PROJECTS" >> "$GITHUB_OUTPUT"

          if [[ "$PROJECTS" == "[]" ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  # ── 2. Compile & test (runs on every PR and on every push to main) ───────────
  #
  #  Skipped entirely when no relevant project files changed (has_changes=false).
  #  Runs one job per changed project using a dynamic matrix.
  # ─────────────────────────────────────────────────────────────────────────────
  ci:
    name: "Compile & Test — ${{ matrix.project }}"
    needs: detect-changes
    # Only run when at least one relevant project was changed.
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    strategy:
      # Keep going for other projects even if one fails.
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.detect-changes.outputs.projects) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java setup ────────────────────────────────────────────────────────────
      # NOTE: Adjust java-version if a future exercise uses a different JDK.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          # Cache Maven dependencies to speed up subsequent runs.
          cache: "maven"

      # ── Compile ───────────────────────────────────────────────────────────────
      - name: Compile ${{ matrix.project }}
        working-directory: ${{ matrix.project }}
        run: mvn --batch-mode compile

      # ── Test ──────────────────────────────────────────────────────────────────
      - name: Test ${{ matrix.project }}
        working-directory: ${{ matrix.project }}
        run: mvn --batch-mode test

  # ── 3. Submit (runs only after a merge into main) ────────────────────────────
  #
  #  Executes submit.sh to produce the ZIP, then creates a GitHub Release and
  #  attaches the ZIP so it is permanently downloadable from the Releases page.
  #
  #  Tag format:  <ExNN>-<short-sha>   e.g.  Ex00-b47a939
  #  This ensures each merge gets its own release even if the same exercise is
  #  updated multiple times.
  #
  #  Guards:
  #    • Only on push events (not PRs).
  #    • Only when at least one relevant project changed.
  # ─────────────────────────────────────────────────────────────────────────────
  submit:
    name: "Submit — ${{ matrix.project }}"
    needs: detect-changes
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.detect-changes.outputs.projects) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java setup ────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      # ── yq (required by submit.sh to parse co-authers.yaml) ──────────────────
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      # ── Run submission script ─────────────────────────────────────────────────
      # Pass the project directory name as the first argument so submit.sh skips
      # the interactive fzf prompt.
      - name: Run submit.sh for ${{ matrix.project }}
        run: bash submit.sh "${{ matrix.project }}"

      # ── Determine ZIP path and release metadata ───────────────────────────────
      # Resolve the exact filename produced by submit.sh (derived from
      # co-authers.yaml) and build a unique release tag from the exercise number
      # and the short commit SHA.
      - name: Resolve ZIP and build release tag
        id: meta
        run: |
          ZIP_PATH=$(ls submissions/*.zip | head -n1)
          ZIP_NAME=$(basename "$ZIP_PATH")

          # Extract exercise prefix, e.g. "Ex00" from "Ex00_MoserMusterfrau_project.zip"
          EX_PREFIX=$(echo "$ZIP_NAME" | grep -oP '^Ex\d+')

          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="${EX_PREFIX}-${SHORT_SHA}"

          echo "zip_path=$ZIP_PATH"   >> "$GITHUB_OUTPUT"
          echo "zip_name=$ZIP_NAME"   >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"             >> "$GITHUB_OUTPUT"
          echo "ex_prefix=$EX_PREFIX" >> "$GITHUB_OUTPUT"

      # ── Create GitHub Release and attach the ZIP ──────────────────────────────
      # softprops/action-gh-release handles tag creation, release creation, and
      # asset upload in one step. The ZIP is permanently visible on the repo's
      # Releases page and can be downloaded directly without logging in.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "${{ steps.meta.outputs.ex_prefix }} Submission (${{ steps.meta.outputs.tag }})"
          body: |
            Automated submission produced on merge to `main`.

            **Project:** `${{ matrix.project }}`
            **Commit:** ${{ github.sha }}
          files: ${{ steps.meta.outputs.zip_path }}
          # Make the release a non-pre-release so it shows as "Latest" on the
          # Releases page. Set prerelease: true if you prefer otherwise.
          prerelease: false
