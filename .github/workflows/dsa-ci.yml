name: DSA Project CI

# ─── Triggers ─────────────────────────────────────────────────────────────────
#
#  • pull_request → main  : compile + test only the changed project(s).
#  • push → main          : (i.e. a PR was merged) compile, test, then run the
#                           submission script and upload the ZIP as an artifact.
#
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── 1. Detect which project(s) actually changed ─────────────────────────────
  #
  #  Runs the helper script .github/scripts/detect-changed-projects.sh which
  #  diffs the two relevant SHAs and returns a JSON array like:
  #    ["Ex00_LastNamesOfMembers_project"]
  #
  #  The result is exposed as a job output so downstream jobs can matrix over it.
  # ─────────────────────────────────────────────────────────────────────────────
  detect-changes:
    name: Detect changed projects
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.detect.outputs.projects }}
      has_changes: ${{ steps.detect.outputs.has_changes }}

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          # Full history is required so the detection script can diff any two SHAs.
          fetch-depth: 0

      - name: Detect changed projects
        id: detect
        run: |
          # Choose the correct base / head pair depending on the event type.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            # push event: github.event.before → github.event.after
            BASE="${{ github.event.before }}"
            HEAD="${{ github.event.after }}"
          fi

          chmod +x .github/scripts/detect-changed-projects.sh
          PROJECTS=$(bash .github/scripts/detect-changed-projects.sh "$BASE" "$HEAD")

          echo "Detected changed projects: $PROJECTS"
          echo "projects=$PROJECTS" >> "$GITHUB_OUTPUT"

          if [[ "$PROJECTS" == "[]" ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  # ── 2. Compile & test (runs on every PR and on every push to main) ───────────
  #
  #  Skipped entirely when no relevant project files changed (has_changes=false).
  #  Runs one job per changed project using a dynamic matrix.
  # ─────────────────────────────────────────────────────────────────────────────
  ci:
    name: "Compile & Test — ${{ matrix.project }}"
    needs: detect-changes
    # Only run when at least one relevant project was changed.
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    strategy:
      # Keep going for other projects even if one fails.
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.detect-changes.outputs.projects) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java setup ────────────────────────────────────────────────────────────
      # NOTE: Adjust java-version if a future exercise uses a different JDK.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          # Cache Maven dependencies to speed up subsequent runs.
          cache: "maven"

      # ── Compile ───────────────────────────────────────────────────────────────
      - name: Compile ${{ matrix.project }}
        working-directory: ${{ matrix.project }}
        run: mvn --batch-mode compile

      # ── Test ──────────────────────────────────────────────────────────────────
      - name: Test ${{ matrix.project }}
        working-directory: ${{ matrix.project }}
        run: mvn --batch-mode test

  # ── 3. Submit (runs only after a merge into main) ────────────────────────────
  #
  #  Executes submit.sh to produce the ZIP, then uploads it as a GitHub Actions
  #  artifact that can be downloaded from the workflow run page.
  #
  #  Guards:
  #    • Only on push events (not PRs).
  #    • Only when at least one relevant project changed.
  # ─────────────────────────────────────────────────────────────────────────────
  submit:
    name: "Submit — ${{ matrix.project }}"
    needs: detect-changes
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.detect-changes.outputs.projects) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java setup ────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      # ── yq (required by submit.sh to parse co-authers.yaml) ──────────────────
      # The system package on Ubuntu runners may be outdated; install from snap
      # or use the pip version for reliability.
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      # ── Run submission script ─────────────────────────────────────────────────
      # Pass the project directory name as the first argument so submit.sh skips
      # the interactive fzf prompt.
      - name: Run submit.sh for ${{ matrix.project }}
        run: bash submit.sh "${{ matrix.project }}"

      # ── Upload the generated ZIP as a workflow artifact ───────────────────────
      # The ZIP lands in submissions/ as produced by submit.sh.
      # Artifact name includes the project name so parallel matrix jobs don't
      # overwrite each other.
      - name: Upload submission ZIP
        uses: actions/upload-artifact@v4
        with:
          name: submission-${{ matrix.project }}
          # Glob picks up whatever submit.sh created (name is derived from
          # co-authers.yaml content, e.g. Ex00_MoserMusterfrau_project.zip).
          path: submissions/*.zip
          # Fail the step if no ZIP was produced.
          if-no-files-found: error
          # Keep artifacts for 90 days (GitHub's maximum for public repos).
          retention-days: 90
